<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindHome: Listings</title>
    <link rel="icon" type="image/png" href="Images/logo.png">
    <link rel="stylesheet" href="stylesheets/listings.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</head>
<body class="text-bg-light">
    <header class="d-flex justify-content-center align-items-center">
        <nav class="rounded-4 d-flex justify-content-sm-evenly align-items-center position-fixed">
            <!-- Logo -->
            <div class="logo">FindHome</div>
            <!-- Navigation links -->
            <div class="nav_link1 d-flex justify-content-evenly align-items-center">
                <a href="index.html">Home</a>
                <a href="listings.html" style="background-color: black; color: white;">Listings</a>
                <a href="contact.html">Contact</a>
            </div>
            <!-- Login and sign up links-->
            <div class="nav_link2 d-flex justify-content-evenly align-items-center">
                <a href="Authentications/login.html" class="login">Login</a>
                <a href="Authentications/register.html" class="signin">Sign Up</a>
            </div>
        </nav>
    </header>
    <!-- Main section -->
    <section>
        <!-- Container for the main image -->
        <div class="main_section d-flex justify-content-center align-items-center">
            <!-- Main image -->
            <div class="main_image rounded-5 d-grid ">
                <!-- Main title and search bar -->
                <div class="main_title">Find Your Dream Home</div>
                <!-- Search bar -->
                <form class="search_bar align-content-center text-center" action="" method="">
                    <!-- Search input field -->
                    <input type="search" name="" id="" class="rounded-5" placeholder="Search for City, Neighborhood and county">
                </form>
            </div>
        </div>
        <!-- Container for the listings and filters -->
        <div class="listings_container">
            <!-- Filters -->
            <div class="filters d-flex align-items-center justify-content-evenly">
                <!-- Filter buttons containers-->
                <div class="add_price">
                    <!-- Filter buttons -->
                    <button class="rounded-3">Add Price <i class="fi fi-rs-angle-small-down"></i></button>
                    <!-- Filter dropdown and it`s content-->
                    <div class="price_range rounded-3">
                        <p>Price range</p>
                        <!-- Price range dropdown -->
                        <label for="price" class="d-flex justify-content-evenly align-items-center flex-wrap">
                            <select name="price" id="price" class="rounded-3">
                                <option value="">No Price</option>
                                <option value="100000">$100,000</option>
                                <option value="200000">$200,000</option>
                                <option value="300000">$300,000</option>
                                <option value="400000">$400,000</option>
                                <option value="500000">$500,000</option>
                                <option value="600000">$600,000</option>
                            </select>
                        </label>
                    </div>
                </div>
                <!-- Filter buttons containers-->
                <div class="building_type">
                    <!-- Filter buttons -->
                    <button class="rounded-3">Building Type <i class="fi fi-rs-angle-small-down"></i></button>
                    <!-- Filter dropdown and it`s content-->
                    <div class="building_type_range rounded-3">
                        <p>Building type range</p>
                    </div>
                </div>
                <!-- Filter buttons containers-->
                <div class="bedrooms">
                    <!-- Filter buttons -->
                    <button class="rounded-3">Bedrooms <i class="fi fi-rs-angle-small-down"></i></button>
                    <!-- Filter dropdown and it`s content-->
                    <div class="bedrooms_range rounded-3">
                        <p>Bedrooms range</p>
                    </div>
                </div>
                <!-- Filter buttons containers-->
                <div class="availability">
                    <!-- Filter buttons -->
                    <button class="rounded-3">Availability <i class="fi fi-rs-angle-small-down"></i></button>
                    <!-- Filter dropdown and it`s content-->
                    <div class="availability_range rounded-3">
                        <p>Availability range</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer></footer>
</body>
</html>
